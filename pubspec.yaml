name: clipboard
description: Clipboard app made with Flutter.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.2
  path: ^1.9.0
  path_provider: ^2.0.12
  file_picker: ^8.1.7
  super_clipboard: ^0.9.1
  uuid: ^4.5.1
  bitsdojo_window: ^0.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter_icons:
  image_path: "assets/images/appicon.png"
  windows:
    generate: true
    image_path: "assets/images/appicon.png"
    icon_size: 48

flutter:
  uses-material-design: true

  assets:
    - assets/images/
